# Release workflow disabled — we consume the widget as a vendor tarball,
# not via npm. Full CI runs on pull_request only (see ci.yml).
# To re-enable npm publishing, restore from upstream NeosiaNexus/SitePing.

name: Release

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to run release (costs Actions minutes)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        if: inputs.confirm != 'YES'
        run: |
          echo "Release not confirmed. Pass confirm=YES to run."
          exit 1

      - name: Notice
        run: echo "Release workflow is disabled for this fork. We use vendor tarball, not npm publish."
