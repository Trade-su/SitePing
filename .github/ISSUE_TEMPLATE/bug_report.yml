name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      description: Browser name and version.
      placeholder: "e.g. Chrome 124, Firefox 126, Safari 17"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating System
      description: Your OS and version.
      placeholder: "e.g. Windows 11, macOS 14.4, Ubuntu 24.04"
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: siteping version
      description: The version of siteping you are using.
      placeholder: "e.g. 0.1.0"
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
    validations:
      required: false
